<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Facturas</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e293b">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 dark:bg-slate-900 text-gray-800 dark:text-slate-200 font-sans antialiased pb-24 transition-colors duration-200">

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwwc0S2F9Ss8RdGSaClBDB7m2MprqXux5wnFVBQQx_l7_dDYVQrTy4KegJtzuzpX_fcYg/exec";
</script>

<div class="max-w-md mx-auto p-4">

<header class="flex justify-between items-center mb-6">
<div>
<h1 class="text-2xl font-bold text-gray-900 dark:text-white">Mis Rendiciones</h1>
<span id="contador-pendientes" class="bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400 text-xs font-semibold px-2.5 py-0.5 rounded-full">0 Pendientes</span>
</div>

<button id="btn-theme" class="p-2 rounded-xl bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 shadow-sm">
🌙
</button>
</header>

<div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 mb-6">
<h2 class="text-lg font-semibold mb-3">1. Cargar Escaneo</h2>

<label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-gray-300 dark:border-slate-600 rounded-xl cursor-pointer bg-gray-50 dark:bg-slate-900 hover:bg-gray-100">
<div class="flex flex-col items-center justify-center pt-5 pb-6">
<p class="text-sm text-gray-500 font-medium">
Tomar Foto / Subir Factura
</p>
</div>
<input id="input-factura" type="file" accept="image/*" class="hidden"/>
</label>

<div id="ocr-status" class="hidden text-sm text-blue-600 font-medium mt-3 animate-pulse text-center">
Procesando con IA Gemini...
</div>
</div>

<div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 mb-6">
<h2 class="text-lg font-semibold mb-3">2. Datos Detectados</h2>

<div class="space-y-3">

<div>
<label class="text-xs font-semibold uppercase">Empresa</label>
<input id="form-empresa" type="text"
class="w-full mt-1 p-2 bg-gray-50 dark:bg-slate-900 border rounded-lg"
placeholder="Esperando documento...">
</div>

<div class="grid grid-cols-2 gap-3">

<div>
<label class="text-xs font-semibold uppercase">N° Factura</label>
<input id="form-numero" type="text"
class="w-full mt-1 p-2 bg-gray-50 dark:bg-slate-900 border rounded-lg">
</div>

<div>
<label class="text-xs font-semibold uppercase">Monto</label>
<input id="form-monto" type="number"
class="w-full mt-1 p-2 bg-gray-50 dark:bg-slate-900 border rounded-lg">
</div>

</div>

<button id="btn-guardar"
class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold p-2.5 rounded-lg">
Guardar Registro
</button>

</div>
</div>

<div>
<h2 class="text-lg font-semibold mb-3">Historial y Control</h2>
<div id="lista-facturas"></div>
</div>

</div>

<script>

const inputFactura = document.getElementById('input-factura');
const ocrStatus = document.getElementById('ocr-status');
const formEmpresa = document.getElementById('form-empresa');
const formNumero = document.getElementById('form-numero');
const formMonto = document.getElementById('form-monto');
const btnGuardar = document.getElementById('btn-guardar');
const listaFacturas = document.getElementById('lista-facturas');
const contadorPendientes = document.getElementById('contador-pendientes');

document.addEventListener('DOMContentLoaded', cargarFacturasDesdeSheet);

inputFactura.addEventListener('change', function(e){

const archivo = e.target.files[0];
if(!archivo) return;

ocrStatus.classList.remove('hidden');

formEmpresa.value="Analizando...";
formNumero.value="";
formMonto.value="";

const lector = new FileReader();

lector.onload = function(evento){

const img = new Image();

img.onload = async function(){

const canvas = document.createElement('canvas');

let ancho = img.width;
let alto = img.height;

/* CAMBIO IMPORTANTE */
const maxDim = 600;

if(ancho > alto && ancho > maxDim){
alto *= maxDim/ancho;
ancho=maxDim;
}
else if(alto > maxDim){
ancho *= maxDim/alto;
alto=maxDim;
}

canvas.width=ancho;
canvas.height=alto;

const ctx = canvas.getContext('2d');
ctx.drawImage(img,0,0,ancho,alto);

/* CAMBIO IMPORTANTE */
const calidad = 0.25;

const dataURL = canvas.toDataURL('image/jpeg', calidad);

const partes = dataURL.split(',');

const mimeType =
partes[0].match(/data:(.*);base64/)[1];

const base64Limpio = partes[1];

console.log(
"Tamaño base64:",
base64Limpio.length
);

console.log(
"MIME:",
mimeType
);

try{

const respuesta = await fetch(WEB_APP_URL,{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
action:"procesarImagen",
base64Image:base64Limpio,
mimeType:mimeType
})
});

const texto = await respuesta.text();

console.log(
"Respuesta Apps Script:",
texto
);

const datosIA = JSON.parse(texto);

if(datosIA.error){
throw new Error(datosIA.detalle);
}

formEmpresa.value =
datosIA.empresa ||
"No detectado";

formNumero.value =
datosIA.numero || "";

formMonto.value =
datosIA.monto || "";

}
catch(error){

console.error(
"Error IA:",
error
);

alert(
"Error al analizar la imagen"
);

formEmpresa.value="";
formNumero.value="";
formMonto.value="";
}
finally{
ocrStatus.classList.add('hidden');
}

};

img.src = evento.target.result;
};

lector.readAsDataURL(archivo);

});

btnGuardar.addEventListener('click', async()=>{

const empresa=formEmpresa.value.trim();
const numero=formNumero.value.trim();
const monto=formMonto.value.trim();

if(!empresa||!numero||!monto){
alert("Completa los datos");
return;
}

await fetch(WEB_APP_URL,{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
action:"add",
empresa,
numero,
monto
})
});

alert("Guardado");

formEmpresa.value="";
formNumero.value="";
formMonto.value="";

cargarFacturasDesdeSheet();

});

async function cargarFacturasDesdeSheet(){

const response=await fetch(WEB_APP_URL);
const datos=await response.json();

contadorPendientes.innerText=
datos.filter(
x=>x.estado==="Pendiente"
).length + " Pendientes";

listaFacturas.innerHTML="";
}

document.getElementById(
'btn-theme'
).onclick=()=>{
document.documentElement.classList.toggle('dark');
};

</script>
</body>
</html>
