<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Control de Facturas</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 text-gray-800 p-4">

<div class="max-w-md mx-auto">

<h1 class="text-2xl font-bold mb-4">Facturas OCR</h1>

<input type="file" id="file" accept="image/*"
class="mb-4"/>

<div id="status" class="text-blue-600 mb-4"></div>

<input id="empresa" placeholder="Empresa"
class="w-full p-2 border mb-2"/>

<input id="numero" placeholder="Número"
class="w-full p-2 border mb-2"/>

<input id="monto" placeholder="Monto"
class="w-full p-2 border mb-2"/>

<button id="guardar"
class="bg-blue-600 text-white px-4 py-2 rounded">
Guardar
</button>

</div>

<script>

// 🔴 CAMBIA SOLO ESTA URL POR TU DEPLOY ACTUAL
const WEB_APP_URL =
"https://script.google.com/macros/s/TU_DEPLOY/exec";

const fileInput = document.getElementById("file");
const statusDiv = document.getElementById("status");

const empresa = document.getElementById("empresa");
const numero = document.getElementById("numero");
const monto = document.getElementById("monto");

// ============================
// SUBIR IMAGEN
// ============================
fileInput.addEventListener("change", (e) => {

const file = e.target.files[0];
if (!file) return;

statusDiv.innerText = "Procesando imagen...";

const reader = new FileReader();

reader.onload = async function(evt) {

const img = new Image();

img.onload = async function() {

try {

// Canvas resize
const canvas = document.createElement("canvas");

let w = img.width;
let h = img.height;

const max = 800;

if (w > h && w > max) {
h *= max / w;
w = max;
} else if (h > max) {
w *= max / h;
h = max;
}

canvas.width = w;
canvas.height = h;

const ctx = canvas.getContext("2d");
ctx.drawImage(img, 0, 0, w, h);

// calidad media
const base64 = canvas.toDataURL("image/jpeg", 0.5).split(",")[1];

console.log("BASE64:", base64.length);

// ============================
// FETCH A APPS SCRIPT
// ============================
const res = await fetch(WEB_APP_URL, {
method: "POST",
body: JSON.stringify({
action: "procesarImagen",
base64Image: base64,
mimeType: "image/jpeg"
}),
headers: {
"Content-Type": "text/plain;charset=utf-8"
}
});

// IMPORTANTE: leer como text primero
const text = await res.text();

console.log("RAW RESPONSE:", text);

// ============================
// PARSE SEGURO
// ============================
let data;

try {
data = JSON.parse(text);
} catch (e) {
console.error("JSON inválido:", text);
statusDiv.innerText = "Error: respuesta inválida del servidor";
return;
}

// ============================
// ERROR BACKEND
// ============================
if (data.error) {
console.error("ERROR BACKEND:", data);
statusDiv.innerText = data.detalle || "Error en servidor";
return;
}

// ============================
// RELLENAR FORM
// ============================
empresa.value = data.empresa || "";
numero.value = data.numero || "";
monto.value = data.monto || "";

statusDiv.innerText = "Listo ✔";

} catch (err) {
console.error(err);
statusDiv.innerText = "Error procesando imagen";
}

};

img.src = evt.target.result;

};

reader.readAsDataURL(file);

});

// ============================
// GUARDAR
// ============================
document.getElementById("guardar").onclick = async () => {

await fetch(WEB_APP_URL, {
method: "POST",
body: JSON.stringify({
action: "add",
empresa: empresa.value,
numero: numero.value,
monto: monto.value
}),
headers: {
"Content-Type": "text/plain;charset=utf-8"
}
});

alert("Guardado");

empresa.value = "";
numero.value = "";
monto.value = "";

};

</script>

</body>
</html>
