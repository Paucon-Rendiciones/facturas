<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Facturas</title>
    <meta name="theme-color" content="#1e293b">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 dark:bg-slate-900 text-gray-800 dark:text-slate-200 font-sans antialiased pb-24">

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwwc0S2F9Ss8RdGSaClBDB7m2MprqXux5wnFVBQQx_l7_dDYVQrTy4KegJtzuzpX_fcYg/exec";
    </script>

    <div class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Mis Rendiciones</h1>
                <span id="contador-pendientes" class="bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400 text-xs font-semibold px-2.5 py-0.5 rounded-full">0 Pendientes</span>
            </div>
            <button id="btn-theme" class="p-2 rounded-xl bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 shadow-sm">🌙</button>
        </header>

        <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 mb-6">
            <h2 class="font-semibold mb-3">1. Cargar Escaneo</h2>
            <input id="input-factura" type="file" accept="image/*" class="w-full p-2 border border-gray-300 dark:border-slate-700 rounded-lg bg-gray-50 dark:bg-slate-900">
            <div id="ocr-status" class="hidden text-blue-600 font-bold mt-3 text-center animate-pulse">Analizando con IA...</div>
        </div>

        <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 mb-6">
            <h2 class="font-semibold mb-3">2. Datos Detectados</h2>
            <div class="space-y-3">
                <input id="form-empresa" class="w-full p-2 border rounded-lg bg-gray-50 dark:bg-slate-900" placeholder="Empresa">
                <div class="grid grid-cols-2 gap-3">
                    <input id="form-numero" class="w-full p-2 border rounded-lg bg-gray-50 dark:bg-slate-900" placeholder="N° Factura">
                    <input id="form-monto" type="number" class="w-full p-2 border rounded-lg bg-gray-50 dark:bg-slate-900" placeholder="Monto">
                </div>
                <button id="btn-guardar" class="w-full bg-blue-600 text-white p-2.5 rounded-lg font-bold">Guardar Registro</button>
            </div>
        </div>

        <div id="lista-facturas" class="space-y-3"></div>
    </div>

    <script>
        const inputFactura = document.getElementById('input-factura');
        const listaFacturas = document.getElementById('lista-facturas');

        document.addEventListener('DOMContentLoaded', cargar);

        inputFactura.addEventListener('change', async (e) => {
            const archivo = e.target.files[0];
            if(!archivo) return;
            document.getElementById('ocr-status').classList.remove('hidden');
            
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 800; canvas.height = (img.height * 800) / img.width;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
                    
                    try {
                        const resp = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({action: "procesarImagen", base64Image: base64}) });
                        const data = await resp.json();
                        document.getElementById('form-empresa').value = data.empresa || "";
                        document.getElementById('form-numero').value = data.numero || "";
                        document.getElementById('form-monto').value = data.monto || "";
                    } catch(e) { alert("Error al conectar con la IA"); }
                    document.getElementById('ocr-status').classList.add('hidden');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(archivo);
        });

        async function cargar() {
            try {
                const r = await fetch(WEB_APP_URL);
                const datos = await r.json();
                listaFacturas.innerHTML = Array.isArray(datos) ? datos.map(f => `
                    <div class="p-4 bg-white dark:bg-slate-800 border rounded-xl flex justify-between items-center">
                        <div><p class="font-bold">${f.empresa || 'Sin nombre'}</p><p class="text-sm">$${f.monto || 0}</p></div>
                        <button onclick="borrar('${f.id}')" class="text-red-500 font-bold px-2">X</button>
                    </div>`).join('') : "";
            } catch(e) { listaFacturas.innerHTML = "Error al cargar datos"; }
        }

        async function borrar(id) {
            await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({action: "delete", id: id}) });
            cargar();
        }

        document.getElementById('btn-theme').addEventListener('click', () => document.documentElement.classList.toggle('dark'));
    </script>
</body>
</html>
