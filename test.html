<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Control Total - Facturas</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 dark:bg-slate-900 text-gray-800 dark:text-slate-200 font-sans antialiased pb-24 transition-colors duration-200">

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwQDmRWYnlDoF2De-KhqG1C_1GdoA-KbzhiAK_ODOzNEPMwtx-1pAD8AgNHqFk0SvQZ/exec";
        let facturasGlobales = [];
        let listaProyectos = JSON.parse(localStorage.getItem("pwa_test_proyectos")) || ["General", "Proyecto Alfa", "Proyecto Beta"];
    </script>

    <div class="max-w-md mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Control de Rendiciones</h1>
        
        <!-- 1. Cargar Escaneo -->
        <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border mb-6">
            <h2 class="text-lg font-semibold mb-3">1. Cargar Escaneo</h2>
            <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed rounded-xl cursor-pointer bg-gray-50 dark:bg-slate-900">
                <span id="label-text">Tomar Foto / Subir Factura</span>
                <input id="input-factura" type="file" accept="image/*" class="hidden" />
            </label>
            <div id="ocr-status" class="hidden text-sm text-blue-600 mt-3 text-center animate-pulse">Analizando con IA...</div>
        </div>

        <!-- 2. Datos y Proyectos -->
        <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border mb-6">
            <h2 class="text-lg font-semibold mb-3">2. Datos y Proyecto</h2>
            <input id="form-empresa" type="text" class="w-full p-2 mb-2 border rounded-lg dark:bg-slate-900" placeholder="Empresa">
            <div class="grid grid-cols-2 gap-2 mb-2">
                <input id="form-numero" type="text" class="p-2 border rounded-lg dark:bg-slate-900" placeholder="N° Factura">
                <input id="form-monto" type="number" class="p-2 border rounded-lg dark:bg-slate-900" placeholder="Monto">
            </div>
            <select id="form-proyecto" class="w-full p-2 mb-3 border rounded-lg dark:bg-slate-900"></select>
            
            <button onclick="document.getElementById('admin-proyectos').classList.toggle('hidden')" class="text-xs text-indigo-600 mb-4 underline">Administrar Proyectos</button>
            <div id="admin-proyectos" class="hidden p-3 bg-gray-50 dark:bg-slate-900 rounded-lg mb-4">
                <div class="flex gap-2 mb-2">
                    <input id="input-nuevo" class="flex-1 p-1 text-xs border rounded" placeholder="Nuevo...">
                    <button onclick="agregarProyecto()" class="bg-indigo-600 text-white px-2 py-1 rounded text-xs">Añadir</button>
                </div>
                <div id="lista-proyectos-gestion" class="text-xs space-y-1"></div>
            </div>

            <button id="btn-guardar" class="w-full bg-indigo-600 text-white p-2.5 rounded-lg font-bold">Guardar Registro</button>
        </div>

        <!-- Panel Reportes -->
        <div id="panel-reportes" class="hidden grid grid-cols-2 gap-3 mb-6">
            <button onclick="enviarWhatsApp()" class="bg-emerald-600 text-white p-3 rounded-xl text-xs font-bold">WhatsApp</button>
            <button onclick="copiarTexto()" class="bg-slate-600 text-white p-3 rounded-xl text-xs font-bold">Copiar Texto</button>
        </div>

        <div id="lista-facturas" class="space-y-3"></div>
    </div>

    <script>
        // Funciones de Proyectos
        function actualizarSelect() {
            const select = document.getElementById('form-proyecto');
            select.innerHTML = listaProyectos.map(p => `<option value="${p}">${p}</option>`).join('');
            renderizarGestion();
        }

        function renderizarGestion() {
            document.getElementById('lista-proyectos-gestion').innerHTML = listaProyectos.map(p => `
                <div class="flex justify-between p-1 bg-white dark:bg-slate-800 border rounded">
                    <span>${p}</span>
                    ${p !== "General" ? `<button onclick="borrarProyecto('${p}')" class="text-red-500 font-bold">X</button>` : ''}
                </div>
            `).join('');
        }

        function agregarProyecto() {
            const val = document.getElementById('input-nuevo').value.trim();
            if(!val || listaProyectos.includes(val)) return;
            listaProyectos.push(val);
            localStorage.setItem("pwa_test_proyectos", JSON.stringify(listaProyectos));
            actualizarSelect();
        }

        function borrarProyecto(nombre) {
            listaProyectos = listaProyectos.filter(p => p !== nombre);
            localStorage.setItem("pwa_test_proyectos", JSON.stringify(listaProyectos));
            actualizarSelect();
        }

        // OCR y Guardado
        document.getElementById('input-factura').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            document.getElementById('ocr-status').classList.remove('hidden');
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 800; canvas.height = (img.height * 800) / img.width;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
                    try {
                        const res = await fetch(WEB_APP_URL, {method:'POST', body: JSON.stringify({action: "procesarImagen", base64Image: base64})});
                        const data = await res.json();
                        document.getElementById('form-empresa').value = data.empresa || "";
                        document.getElementById('form-numero').value = data.numero || "";
                        document.getElementById('form-monto').value = data.monto || "";
                    } catch(e) { alert("Error"); }
                    document.getElementById('ocr-status').classList.add('hidden');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('btn-guardar').addEventListener('click', async () => {
            const data = { action: "add", empresa: document.getElementById('form-empresa').value, numero: document.getElementById('form-numero').value, monto: document.getElementById('form-monto').value, proyecto: document.getElementById('form-proyecto').value };
            await fetch(WEB_APP_URL, {method:'POST', body: JSON.stringify(data)});
            cargarDatos();
        });

        async function cargarDatos() {
            const res = await fetch(WEB_APP_URL);
            facturasGlobales = await res.json();
            const list = document.getElementById('lista-facturas');
            list.innerHTML = facturasGlobales.map(f => `
                <div class="p-3 bg-white dark:bg-slate-800 rounded-lg shadow-sm border">
                    <p class="font-bold">${f.empresa}</p>
                    <p class="text-sm">${f.monto} - ${f.proyecto}</p>
                </div>
            `).join('');
            document.getElementById('panel-reportes').classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', () => { actualizarSelect(); cargarDatos(); });
    </script>
</body>
</html>
